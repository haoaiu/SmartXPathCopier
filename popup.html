<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XPath Picker</title>
  <style>
    body {
      margin: 0;
      padding: 14px;
      width: 300px;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #222;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .section {
      margin-bottom: 14px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 14px;
      line-height: 1.4;
      flex: 1;
    }

    .desc {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
      line-height: 1.4;
    }

    .switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      inset: 0;
      cursor: pointer;
      background: #ccc;
      border-radius: 24px;
      transition: .2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: .2s;
    }

    .switch input:checked + .slider {
      background: #1677ff;
    }

    .switch input:checked + .slider:before {
      transform: translateX(18px);
    }

    .btn {
      width: 100%;
      border: none;
      background: #52c41a;
      color: #fff;
      border-radius: 6px;
      padding: 10px 12px;
      cursor: pointer;
      font-size: 14px;
      margin-top: 6px;
    }

    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      min-height: 18px;
      white-space: pre-wrap;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="title">XPath Picker</div>

  <div class="section">
    <div class="row">
      <div class="label">
        显示页面右上角按钮
        <div class="desc">关闭后不再显示“选择 XPath”悬浮按钮</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="showFloatingButton" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="row">
      <div class="label">
        同时复制元素标签体
        <div class="desc">开启后复制内容将包含 XPath + 标签体</div>
      </div>
      <label class="switch">
        <input type="checkbox" id="includeElementHtml" />
        <span class="slider"></span>
      </label>
    </div>
  </div>

  <button class="btn" id="togglePickerBtn">开启/关闭页面选择</button>

  <div class="status" id="statusText"></div>

  <script src="popup.js"></script>
</body>
</html>
